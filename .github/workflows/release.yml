name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Lint
        run: deno lint
      - name: Test
        run: deno test --allow-all

  build:
    needs: check
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: dacha-darwin-arm64
            runner: macos-latest
          - target: x86_64-apple-darwin
            artifact: dacha-darwin-x64
            runner: macos-latest
          - target: aarch64-unknown-linux-gnu
            artifact: dacha-linux-arm64
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            artifact: dacha-linux-x64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile
        run: deno compile --allow-read --allow-write --allow-env --allow-net --allow-run --allow-sys --target ${{ matrix.target }} --output ${{ matrix.artifact }} src/cli.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum dacha-* > sha256sums.txt
        working-directory: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish to GitHub Packages
        run: deno publish --allow-dirty
